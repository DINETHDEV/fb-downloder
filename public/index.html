<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facebook Video Downloader</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Animated Background Shapes -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <div class="container glass-panel">
    <div class="header">
      <h1><i class="fab fa-facebook"></i> FB Downloader</h1>
      <p class="subtitle">Download Facebook videos in high quality</p>
    </div>

    <div class="content">
      <div class="input-group">
        <input type="text" id="fbUrl" placeholder="Paste Facebook video URL here..." />
        <i class="fas fa-link"></i>
        <div class="input-glow"></div>
      </div>

      <button class="download-btn" id="downloadBtn" onclick="downloadVideo()">
        <span class="btn-content">
          <i class="fas fa-cloud-download-alt"></i> Download Video
        </span>
        <div class="btn-glow"></div>
      </button>

      <div class="loader" id="loader">
        <div class="modern-spinner">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
        <p class="loading-text">Fetching video info<span class="dots">...</span></p>
      </div>

      <div class="error-message" id="errorMessage">
        <div class="error-content">
          <i class="fas fa-exclamation-triangle pulse-anim"></i>
          <span id="errorText">Error fetching video. Please check the URL and try again.</span>
        </div>
      </div>

      <div class="result" id="result"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>POWERED BY <span class="highlight">GRIDX DEV STUDIO</span></p>
    <p class="copyright">&copy; 2026 ALL RIGHTS RESERVED</p>
  </div>

  <script src="script.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
</body>

</html>
